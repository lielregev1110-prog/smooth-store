<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMOOTH | Elite Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #000; color: #fff; }
        .product-card:hover img { transform: scale(1.05); transition: 0.4s; }
        .cart-sidebar { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        .cart-sidebar.active { transform: translateX(0); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navbar -->
    <nav class="flex justify-between items-center p-6 border-b border-zinc-800 sticky top-0 bg-black z-50">
        <h1 class="text-3xl font-bold tracking-tighter">SMOOTH</h1>
        <div class="flex gap-6 items-center">
            <button onclick="toggleCart()" class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="h-[60vh] bg-zinc-900 flex items-center justify-center relative overflow-hidden">
        <div class="text-center z-10">
            <h2 class="text-6xl font-extrabold mb-4 italic">ELITE SUMMER 2026</h2>
            <p class="text-zinc-400 tracking-widest uppercase">Experience the Void Collection</p>
        </div>
        <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=1600')] bg-cover bg-center"></div>
    </div>

    <!-- Products Grid -->
    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            {% for p in products %}
            <div class="product-card group cursor-pointer">
                <div class="overflow-hidden bg-zinc-900 aspect-[3/4] mb-4">
                    <img src="{{ p.img }}" alt="{{ p.name }}" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                </div>
                <h3 class="text-lg font-bold">{{ p.name }}</h3>
                <p class="text-zinc-500 mb-4">₪{{ p.price }}</p>
                <button onclick="addToCart({{ p.id }}, '{{ p.name }}', {{ p.price }})" class="w-full py-3 border border-white hover:bg-white hover:text-black transition uppercase text-sm font-bold tracking-widest">הוסף לסל</button>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- Side Cart (הסל של מאניה/רנואר) -->
    <div id="cart-sidebar" class="cart-sidebar fixed top-0 right-0 h-full w-full md:w-[400px] bg-white text-black z-[100] shadow-2xl p-8 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold uppercase italic">הסל שלך</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-6">
            <!-- פריטים יופיעו כאן -->
        </div>

        <div class="border-t border-zinc-200 pt-6 mt-6">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>סה"כ:</span>
                <span id="cart-total">₪0</span>
            </div>
            <button onclick="checkout()" class="w-full py-4 bg-black text-white uppercase font-bold tracking-widest hover:bg-zinc-800 transition">סיים רכישה</button>
        </div>
    </div>

    <script>
        let cart = [];
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function addToCart(id, name, price) {
            cart.push({id, name, price});
            updateCart();
            if(!document.getElementById('cart-sidebar').classList.contains('active')) toggleCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            
            container.innerHTML = '';
            let sum = 0;
            
            cart.forEach((item, index) => {
                sum += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center border-b pb-4">
                        <div>
                            <p class="font-bold uppercase text-sm">${item.name}</p>
                            <p class="text-zinc-500">₪${item.price}</p>
                        </div>
                        <button onclick="cart.splice(${index},1);updateCart()" class="text-red-500 text-xs">הסר</button>
                    </div>
                `;
            });
            
            count.innerText = cart.length;
            total.innerText = `₪${sum}`;
        }

        function checkout() {
            if(cart.length === 0) return alert("הסל ריק");
            const name = prompt("שם מלא:");
            const address = prompt("כתובת למשלוח:");
            
            if(name && address) {
                fetch('/complete_order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: name,
                        address: address,
                        items: cart.map(i => i.name).join(', '),
                        total: document.getElementById('cart-total').innerText
                    })
                }).then(res => res.json()).then(data => {
                    if(data.success) {
                        alert("ההזמנה נשלחה! ניצור קשר בהקדם.");
                        cart = [];
                        updateCart();
                        toggleCart();
                    }
                });
            }
        }
    </script>
</body>
</html>
