<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>SMOOTH | Final Edition</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #0a0a0a; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        
        /* Header Elite */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 2px solid var(--gold); background: #000; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 12px; color: var(--gold); text-decoration: none; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 5%; }
        .card { background: var(--card); border: 1px solid #111; position: relative; transition: 0.5s; overflow: hidden; }
        .card:hover { border-color: var(--gold); transform: scale(1.02); }
        .card img { width: 100%; height: 400px; object-fit: cover; }
        
        .buy-btn { background: var(--gold); color: #000; width: 100%; padding: 15px; font-weight: bold; border: none; cursor: pointer; }

        /* WhatsApp Button */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; text-decoration: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); font-size: 30px; }

        /* Coupon Section */
        .coupon-box { margin-top: 20px; border: 1px dashed var(--gold); padding: 15px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; margin: 5px; width: 80%; }
    </style>
</head>
<body>

<a href="https://wa.me/972555562667" class="wa-float" target="_blank">💬</a>

<header>
    <div onclick="location.href='/login_google'" style="cursor:pointer">👤 כניסת VIP</div>
    <a href="/" class="logo">SMOOTH</a>
    <div>🛒 סל (<span id="cart-count">0</span>)</div>
</header>

<section class="grid">
    {% for p in products %}
    <div class="card">
        <img src="{{ p.img }}">
        <div style="padding: 20px; text-align: center;">
            <h3>{{ p.name }}</h3>
            <p style="color: var(--gold); font-size: 1.5rem;">{{ p.price }} ₪</p>
            <button class="buy-btn" onclick="addToCart('{{ p.name }}', {{ p.price }})">ADD TO BAG</button>
        </div>
    </div>
    {% endfor %}
</section>

<div id="checkout" style="padding: 5% 10%; background: #000;">
    <h2 style="color: var(--gold);">CHECKOUT</h2>
    <div id="cart-items"></div>
    <div class="coupon-box">
        <input type="text" id="coupon-code" placeholder="הכנס קוד קופון (נסה: SMOOTH20)">
        <button onclick="applyCoupon()" style="background:var(--gold); border:none; padding:10px;">הפעל</button>
    </div>
    <h3 id="final-total">סה"כ: 0 ₪</h3>
    <input type="text" id="cust-name" placeholder="שם מלא">
    <input type="text" id="cust-addr" placeholder="כתובת למשלוח">
    <button class="buy-btn" style="margin-top:20px;" onclick="sendOrder()">סיים הזמנה ושלח אישור למנהל</button>
</div>

<script>
    let cart = [];
    let discount = 0;

    function addToCart(n, p) {
        cart.push({n, p});
        document.getElementById('cart-count').innerText = cart.length;
        updateUI();
    }

    function updateUI() {
        let total = cart.reduce((s, i) => s + i.p, 0);
        let final = total * (1 - discount);
        document.getElementById('final-total').innerText = `סה"כ: ${final.toFixed(0)} ₪`;
        document.getElementById('cart-items').innerHTML = cart.map(i => `<p>${i.n} - ${i.p}₪</p>`).join('');
    }

    async function applyCoupon() {
        let code = document.getElementById('coupon-code').value;
        let res = await fetch('/apply_coupon', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code})
        });
        let data = await res.json();
        if(data.success) {
            discount = data.discount;
            alert("קופון הופעל בהצלחה!");
            updateUI();
        } else {
            alert("קוד לא תקין");
        }
    }

    async function sendOrder() {
        let orderData = {
            name: document.getElementById('cust-name').value,
            address: document.getElementById('cust-addr').value,
            items: cart.map(i => i.n).join(", "),
            total: document.getElementById('final-total').innerText
        };
        let res = await fetch('/complete_order', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(orderData)
        });
        if(res.ok) alert("הזמנה הושלמה! אישור נשלח ל-lielregev1110@gmail.com");
    }
</script>
</body>
</html>
