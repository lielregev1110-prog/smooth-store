<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMOOTH | Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --panel: #111; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: #fff; margin: 0; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: #000; position: sticky; top:0; z-index:100; border-bottom: 1px solid #222; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: 5px; color: #fff; text-decoration: none; }
        
        /* חיפוש */
        .search-bar { display: flex; gap: 5px; }
        input[type="text"] { background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        
        /* גריד מוצרים */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: var(--panel); border: 1px solid #222; padding: 15px; text-align: center; transition: 0.3s; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card:hover { border-color: var(--red); }

        /* חלונית סל קניות */
        #cart-panel { 
            position: fixed; top: 0; left: -400px; width: 350px; height: 100%; 
            background: #000; border-right: 1px solid #333; transition: 0.5s; z-index: 1001; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        #cart-panel.open { left: 0; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .btn { background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-red { background: var(--red); color: #fff; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleCart()" style="cursor:pointer; font-size: 1.2rem;">🛒 סל (<span id="count">0</span>)</div>
    
    <form class="search-bar" action="/" method="GET">
        <input type="text" name="search" placeholder="חפש מוצר...">
        <button type="submit" class="btn">חפש</button>
    </form>

    <a href="/" class="logo">SMOOTH</a>
</header>

<!-- סל קניות צדדי -->
<div id="cart-panel">
    <h2>הסל שלי</h2>
    <div id="cart-items">
        <!-- מוצרים יתווספו כאן -->
    </div>
    <div id="total-price" style="margin-top: 20px; font-weight: bold;">סה"כ: 0 ₪</div>
    <button class="btn btn-red" onclick="openCheckout()">עבור לתשלום</button>
    <p onclick="toggleCart()" style="text-align: center; cursor: pointer; margin-top: 15px; color: #888;">סגור</p>
</div>

<!-- גריד מוצרים -->
<section class="grid">
    {% for p in products %}
    <div class="card">
        <img src="{{ p.image }}" alt="{{ p.name }}">
        <h3>{{ p.name }}</h3>
        <p>{{ p.price }} ₪</p>
        <button class="btn" onclick="addToCart('{{ p.name }}', {{ p.price }})">הוסף לסל</button>
    </div>
    {% endfor %}
</section>

<script>
    let cart = [];

    function addToCart(name, price) {
        cart.push({name, price});
        updateCartUI();
        // פותח את הסל אוטומטית כשמוסיפים מוצר
        document.getElementById('cart-panel').classList.add('open');
    }

    function toggleCart() {
        document.getElementById('cart-panel').classList.toggle('open');
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items');
        const count = document.getElementById('count');
        const total = document.getElementById('total-price');
        
        list.innerHTML = '';
        let totalPrice = 0;
        
        cart.forEach((item, index) => {
            totalPrice += item.price;
            list.innerHTML += `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} ₪</span>
                </div>
            `;
        });
        
        count.innerText = cart.length;
        total.innerText = `סה"כ: ${totalPrice} ₪`;
    }

    function openCheckout() {
        if (cart.length === 0) { alert("הסל ריק!"); return; }
        // כאן אתה יכול להציג את טופס האשראי שבנינו קודם
        alert("מעביר לדף תשלום מאובטח...");
    }
</script>

</body>
</html>
